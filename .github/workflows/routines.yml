name: Daily Routines

on:
  # Triggered externally by cron-job.org for precise timing (see scripts/setup_crons.py)
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (leave empty to run all)'
        required: false
        default: 'all'

jobs:
  daily_intro:
    name: Daily Intro (07:00 TH)
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 0 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'daily_intro'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-base-${{ hashFiles('requirements-base.txt') }}
      - run: pip install -r requirements-base.txt
      - run: python routines/daily_intro.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  morning_news:
    name: Morning News (09:00 TH)
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 2 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'morning_news'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-heavy-${{ hashFiles('requirements-base.txt', 'requirements-heavy.txt') }}
      - run: pip install -r requirements-base.txt -r requirements-heavy.txt
      - run: python routines/morning_news.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  celeb_watch:
    name: Celeb Watch (20:00 TH)
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 13 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'celeb_watch'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-base-${{ hashFiles('requirements-base.txt') }}
      - run: pip install -r requirements-base.txt
      - run: python routines/celeb_watch.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  night_shift:
    name: Night Shift (23:00 TH)
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 16 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'night_shift'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-heavy-${{ hashFiles('requirements-base.txt', 'requirements-heavy.txt') }}
      - run: pip install -r requirements-base.txt -r requirements-heavy.txt
      - run: python routines/night_shift.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  market_pulse:
    name: Market Pulse (20:00 TH)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      github.event.schedule == '0 13 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'market_pulse'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-heavy-${{ hashFiles('requirements-base.txt', 'requirements-heavy.txt') }}
      - run: pip install -r requirements-base.txt -r requirements-heavy.txt
      - run: python routines/market_pulse.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit regime state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/market_state.json
          git diff --staged --quiet && echo "state unchanged" || (git commit -m "chore: update market state [skip ci]" && git push)

  trend_update:
    name: Trend Update (14:00 TH Wed & Sun)
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '0 7 * * 3,0' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'trend_update'))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-base-${{ hashFiles('requirements-base.txt') }}
      - run: pip install -r requirements-base.txt
      - run: python routines/trend_update.py
        env:
          PYTHONUNBUFFERED: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
